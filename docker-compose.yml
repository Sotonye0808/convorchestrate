version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: convorchestrate
      POSTGRES_USER: convorchestrate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-convorchestrate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://convorchestrate:${DB_PASSWORD:-convorchestrate}@postgres:5432/convorchestrate
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://convorchestrate:${DB_PASSWORD:-convorchestrate}@postgres:5432/convorchestrate
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  dashboard:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  postgres_data:
    driver: local

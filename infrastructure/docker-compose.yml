version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ../
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ../
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  postgres_data:

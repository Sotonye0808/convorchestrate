services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: convorchestrate
      POSTGRES_USER: convorchestrate
      POSTGRES_PASSWORD: convorchestrate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convorchestrate"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://convorchestrate:convorchestrate@postgres:5432/convorchestrate?sslmode=disable
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      META_PHONE_NUMBER_ID: ""
      META_ACCESS_TOKEN: ""
      META_WABA_ID: ""
      META_APP_ID: ""
      META_APP_SECRET: ""
      META_WEBHOOK_VERIFY_TOKEN: ""
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  pgdata:
